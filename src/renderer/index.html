<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self';
           script-src 'self';
           connect-src 'self';
           style-src 'self' 'unsafe-inline';
           img-src 'self' data: https:;
           font-src 'self' data:;
           frame-src https://*.takawasi-social.com;
           object-src 'none';
           base-uri 'none';
           form-action 'none';">
<title>Takawasi NovelForge</title>
<link rel="stylesheet" href="dockview.css">
<link rel="stylesheet" href="xterm.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Activity Bar: NovelForge 専用 3パネル + 認証 -->
<div id="activity-bar">
  <div id="activity-bar-top">
    <!-- Logo: 本アイコン -->
    <div id="activity-logo" title="Takawasi NovelForge">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </div>

    <!-- 小説一覧 panel -->
    <button class="activity-item" data-panel="novels" title="小説一覧" aria-label="小説一覧">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
    </button>

    <!-- チャット panel -->
    <button class="activity-item" data-panel="chat" title="エージェントチャット" aria-label="エージェントチャット">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>

    <!-- プレビュー panel -->
    <button class="activity-item" data-panel="preview" title="編集・プレビュー" aria-label="編集・プレビュー">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </button>
  </div>

  <div id="activity-bar-bottom">
    <!-- Auth -->
    <button class="activity-item" id="activity-auth" title="ログイン" aria-label="ログイン">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icon-auth">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
  </div>
</div>

<!-- Main area: dockview container -->
<div id="app-root">
  <div id="dockview-container"></div>
</div>

<!-- Panel templates -->

<!-- 小説一覧 panel -->
<template id="tmpl-novels">
  <div class="panel-content" id="panel-content-novels">
    <div class="panel-toolbar">
      <span class="toolbar-title">小説一覧</span>
      <button id="btn-novels-refresh" class="icon-btn" title="更新">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
    </div>
    <div id="novels-list" class="novels-list">
      <div class="panel-placeholder">ログイン後に小説一覧が表示されます</div>
    </div>
  </div>
</template>

<!-- エージェントチャット panel (TBA, service=novelforge 固定) -->
<template id="tmpl-chat">
  <div class="panel-content" id="panel-content-chat">
    <div id="chat-messages" class="tba-messages"></div>
    <div id="chat-input-area" class="tba-input-area">
      <span id="chat-stage-label" class="stage-label"></span>
      <textarea id="chat-input" class="tba-input" placeholder="小説のアイデアや指示を入力... (Enter で送信、Shift+Enter で改行)" rows="3"></textarea>
      <button id="chat-send" class="btn-send">送信</button>
    </div>
  </div>
</template>

<!-- 編集・プレビュー panel (iframe 埋込) -->
<template id="tmpl-preview">
  <div class="panel-content" id="panel-content-preview">
    <div class="panel-toolbar">
      <span class="toolbar-title" id="preview-doc-title">ドキュメント未選択</span>
      <a id="preview-open-web" class="icon-btn hidden" href="#" target="_blank" rel="noopener" title="ブラウザで開く">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    </div>
    <div id="preview-placeholder" class="panel-placeholder">
      左の一覧から小説を選択してください
    </div>
    <webview id="wv-preview"
      src="about:blank"
      partition="persist:takawasi"
      webpreferences="contextIsolation=yes,nodeIntegration=no,sandbox=yes"
      class="panel-webview hidden">
    </webview>
  </div>
</template>

<!-- Auth status bar (bottom) -->
<div id="status-bar">
  <span id="auth-status-text">未ログイン</span>
  <button id="btn-login" class="status-btn">ログイン</button>
  <button id="btn-logout" class="status-btn hidden">ログアウト</button>
</div>

<script src="app.js"></script>
</body>
</html>
